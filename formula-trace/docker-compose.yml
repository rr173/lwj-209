services:
  backend:
    build: ./backend
    container_name: formula-trace-backend
    restart: unless-stopped
    volumes:
      - ./backend/data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///app/data/formula_trace.db
    networks:
      - formula-trace-network

  frontend:
    build: ./frontend
    container_name: formula-trace-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - formula-trace-network

networks:
  formula-trace-network:
    driver: bridge
